<!DOCTYPE html>
<html>

<head>
    <title>Container AI System</title>

    <style>
        body {
            font-family: Arial;
            background: #0f172a;
            color: white;
            margin: 0;
            padding: 0;
        }

        .container {
            max-width: 900px;
            margin: auto;
            padding: 25px;
        }

        .card {
            background: #1e293b;
            padding: 20px;
            margin-bottom: 20px;
            border-radius: 12px;
        }

        input,
        select,
        textarea,
        button {
            width: 100%;
            padding: 10px;
            margin-top: 8px;
            border-radius: 8px;
            border: none;
        }

        button {
            background: #38bdf8;
            font-weight: bold;
            cursor: pointer;
        }

        button:hover {
            background: #0ea5e9;
        }

        .result {
            white-space: pre-line;
            background: #0b1220;
            padding: 15px;
            border-radius: 10px;
        }
    </style>
</head>

<body>

    <div class="container">

        <h1>🚢 Container Analysis AI</h1>

        <!-- USER INPUTS -->
        <div class="card">

            <label>Reg No</label>
            <input type="text" id="reg_no">

            <label>Net Weight (kg)</label>
            <input type="number" id="net_weight">

            <label>Package Size</label>
            <select id="package_size">
                <option value="N/A">N/A</option>
                <option value="25kg">25kg</option>
                <option value="50kg">50kg</option>
            </select>

        </div>

        <!-- IMAGE INPUT -->
        <div class="card">

            <h3>Image Input Options</h3>

            <label>Upload Image</label>
            <input type="file" id="fileInput">

            <p style="text-align:center;">OR</p>

            <label>Paste Base64</label>
            <textarea id="base64Input" rows="5" placeholder="Paste base64 here..."></textarea>

        </div>

        <!-- BUTTON -->
        <div class="card">
            <button onclick="analyze()">Analyze Container</button>
        </div>

        <!-- OUTPUT -->
        <div class="card">
            <h3>Result</h3>
            <div id="output" class="result">Waiting...</div>
        </div>

    </div>

    <script>

        const API_URL = "https://chip-crouch-referable.ngrok-free.dev/analyze-base64";

        // convert file → base64
        function fileToBase64(file) {
            return new Promise((resolve, reject) => {
                const reader = new FileReader();
                reader.readAsDataURL(file);
                reader.onload = () => resolve(reader.result);
                reader.onerror = error => reject(error);
            });
        }

        async function analyze() {

            let base64 = document.getElementById("base64Input").value;
            const file = document.getElementById("fileInput").files[0];

            // if file selected → override base64
            if (file) {
                base64 = await fileToBase64(file);
                base64 = base64.split(",")[1];
            }

            if (!base64) {
                alert("Please upload image or paste base64!");
                return;
            }

            const payload = {
                base64_image: base64,
                reg_no: document.getElementById("reg_no").value,
                net_weight: parseFloat(document.getElementById("net_weight").value),
                package_size: document.getElementById("package_size").value
            };

            document.getElementById("output").innerText = "Processing...";

            try {
                const res = await fetch(API_URL, {
                    method: "POST",
                    headers: {
                        "Content-Type": "application/json"
                    },
                    body: JSON.stringify(payload)
                });

                const data = await res.json();

                document.getElementById("output").innerText =
                    `
        Reg No: ${data.reg_no}
        Container Type: ${data.container_type}
        Estimated Packages: ${data.estimated_package_count}

        Observed Fill Ratio: ${data.observed_fill_ratio_percent}%
        Declared Weight: ${data.declared_net_weight_kg} kg
        Estimated Weight: ${data.estimated_weight_kg} kg
        Weight Difference: ${data.weight_difference_kg} kg

        Status: ${data.risk_status}

        Conclusion: ${data.conclusion}
        `;

            } catch (err) {
                document.getElementById("output").innerText = "API Error!";
            }
        }

    </script>

</body>

</html>
